services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: lconn
      POSTGRES_USER: lconn
      POSTGRES_PASSWORD: lconn_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lconn"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
